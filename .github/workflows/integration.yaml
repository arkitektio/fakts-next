name: Integration Tests
on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]
jobs:
  test_integration:
    # fakts-next has no backend of its own — its integration stack runs the lok
    # auth server and a rekuest backend. Test prerelease branches against the
    # prerelease backends (:next) and the stable line against :latest. base_ref
    # is set on PRs, ref_name on pushes.
    env:
      LOK_SERVICE_TAG: ${{ (github.base_ref || github.ref_name) == 'main' && 'latest' || 'next' }}
      REKUEST_SERVICE_TAG: ${{ (github.base_ref || github.ref_name) == 'main' && 'latest' || 'next' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      # fakts-next has Qt-backed tests; give them a virtual display.
      - uses: pyvista/setup-headless-display-action@v3
        with:
          qt: true

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest -m integration
